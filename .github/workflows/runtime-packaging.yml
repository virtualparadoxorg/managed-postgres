name: Runtime Packaging

on:
  workflow_dispatch:
    inputs:
      postgres_version:
        description: PostgreSQL release version to package
        required: true
        type: string
      packaging_revision:
        description: Managed Postgres packaging revision
        required: true
        type: string
      publish_release:
        description: Attach bundles to a GitHub release named pg<version>-<revision>
        required: false
        default: false
        type: boolean
      smoke_mode:
        description: Build a smoke-fixture runtime bundle instead of compiling PostgreSQL from source
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: macos-x86_64
          - runner: macos-latest
            target: macos-aarch64
          - runner: ubuntu-24.04
            target: linux-x86_64-glibc
          - runner: windows-2025
            target: windows-x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Prepare runner build prerequisites
        uses: ./.github/actions/setup-postgres-build-env
        with:
          skip-install: ${{ inputs.smoke_mode }}

      - name: Create smoke install tree
        if: ${{ inputs.smoke_mode }}
        shell: bash
        env:
          TARGET_PLATFORM: ${{ matrix.target }}
          RAW_INSTALL_TREE: ${{ github.workspace }}/target/runtime-packaging-smoke/${{ matrix.target }}/raw-install
        run: ./scripts/runtime-packaging/create-smoke-install-tree.sh

      - name: Build runtime bundle
        shell: bash
        env:
          POSTGRES_VERSION: ${{ inputs.postgres_version }}
          PACKAGING_REVISION: ${{ inputs.packaging_revision }}
          TARGET_PLATFORM: ${{ matrix.target }}
          DIST_DIR: dist/${{ matrix.target }}
          RAW_INSTALL_TREE: ${{ inputs.smoke_mode && format('{0}/target/runtime-packaging-smoke/{1}/raw-install', github.workspace, matrix.target) || '' }}
        run: ./scripts/runtime-packaging/build-phase1.sh

      - name: Publish runtime bundle metadata
        id: publish
        shell: bash
        env:
          POSTGRES_VERSION: ${{ inputs.postgres_version }}
          PACKAGING_REVISION: ${{ inputs.packaging_revision }}
          TARGET_PLATFORM: ${{ matrix.target }}
          DIST_DIR: dist/${{ matrix.target }}
          PUBLISH_GITHUB_RELEASE: ${{ inputs.publish_release }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/runtime-packaging/publish-phase1.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.publish.outputs.artifact_name }}
          path: ${{ steps.publish.outputs.artifact_path }}
          if-no-files-found: error
