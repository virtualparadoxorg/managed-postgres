name: Runtime Packaging

on:
  workflow_dispatch:
    inputs:
      postgres_version:
        description: PostgreSQL release version to package
        required: true
        type: string
      packaging_revision:
        description: Managed Postgres packaging revision
        required: true
        type: string
      publish_release:
        description: Attach bundles to a GitHub release named pg<version>-<revision>
        required: false
        default: false
        type: boolean
      smoke_mode:
        description: Build a smoke-fixture runtime bundle instead of compiling PostgreSQL from source
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS runners are temporarily disabled due to hosted-runner cost.
          # - runner: macos-15-intel
          #   target: macos-x86_64
          # - runner: macos-latest
          #   target: macos-aarch64
          - runner: ubuntu-24.04
            target: linux-x86_64-glibc
          - runner: windows-2025
            target: windows-x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Prepare runner build prerequisites
        uses: ./.github/actions/setup-postgres-build-env
        with:
          skip-install: ${{ inputs.smoke_mode }}

      - name: Create smoke install tree
        if: ${{ inputs.smoke_mode }}
        shell: bash
        env:
          TARGET_PLATFORM: ${{ matrix.target }}
          RAW_INSTALL_TREE: ${{ github.workspace }}/target/runtime-packaging-smoke/${{ matrix.target }}/raw-install
        run: ./scripts/runtime-packaging/create-smoke-install-tree.sh

      - name: Build runtime bundle
        shell: bash
        env:
          POSTGRES_VERSION: ${{ inputs.postgres_version }}
          PACKAGING_REVISION: ${{ inputs.packaging_revision }}
          TARGET_PLATFORM: ${{ matrix.target }}
          DIST_DIR: dist/${{ matrix.target }}
          RAW_INSTALL_TREE: ${{ inputs.smoke_mode && format('{0}/target/runtime-packaging-smoke/{1}/raw-install', github.workspace, matrix.target) || '' }}
          MANAGED_POSTGRES_WINDOWS_DIAGNOSTICS: ${{ !inputs.smoke_mode && runner.os == 'Windows' && '1' || '' }}
        run: ./scripts/runtime-packaging/build-phase1.sh

      - name: Diagnose Unix source-build failure
        if: ${{ failure() && !inputs.smoke_mode && runner.os != 'Windows' }}
        shell: bash
        env:
          TARGET_PLATFORM: ${{ matrix.target }}
        run: |
          set -x
          work_root="${GITHUB_WORKSPACE}/target/runtime-packaging-work/${TARGET_PLATFORM}"
          build_lmgr="${work_root}/build/${TARGET_PLATFORM}/src/backend/storage/lmgr"
          source_lmgr="${work_root}/source/${TARGET_PLATFORM}"/postgresql-*/src/backend/storage/lmgr
          ls -la "${build_lmgr}" || true
          ls -la ${source_lmgr} || true
          find "${work_root}" -name 'lwlocknames.c' -o -name 'lwlocknames.h' -o -name 'lwlocknames.o' | sort || true
          for file in "${build_lmgr}/lwlocknames.o" ${source_lmgr}/lwlocknames.c ${source_lmgr}/lwlocknames.h; do
            if [[ -f "${file}" ]]; then
              echo "=== ${file}"
              wc -c "${file}" || true
            fi
          done
          if [[ -f "${build_lmgr}/lwlocknames.o" ]]; then
            nm "${build_lmgr}/lwlocknames.o" | rg 'IndividualLWLockNames| U ' || true
          fi
          if [[ -f "${build_lmgr}/lwlock.o" ]]; then
            nm "${build_lmgr}/lwlock.o" | rg 'IndividualLWLockNames|GetLWLockIdentifier|GetLWTrancheName' || true
          fi
          if ls ${source_lmgr}/lwlocknames.c >/dev/null 2>&1; then
            sed -n '1,40p' ${source_lmgr}/lwlocknames.c || true
          fi

      - name: Diagnose Windows source-build failure
        if: ${{ failure() && !inputs.smoke_mode && runner.os == 'Windows' }}
        shell: bash
        run: |
          set -x
          diagnostics_file="${GITHUB_WORKSPACE}/target/runtime-packaging-work/windows-x86_64/build/windows-x86_64/managed-postgres-windows-env-probe.txt"
          if [[ -f "${diagnostics_file}" ]]; then
            echo "=== ${diagnostics_file}"
            cat "${diagnostics_file}"
          fi
          where.exe msbuild || true
          where.exe cl || true
          where.exe mvn || true
          where.exe mvn.cmd || true
          where.exe link || true
          where.exe perl || true
          ls -la "/c/Program Files/Microsoft Visual Studio" || true
          find "${GITHUB_WORKSPACE}/target/runtime-packaging-work/windows-x86_64" -maxdepth 6 \
            \( -name build.pl -o -name Solution.pm -o -name lwlocknames.c -o -name lwlocknames.h \) | sort || true

      - name: Publish runtime bundle metadata
        id: publish
        shell: bash
        env:
          POSTGRES_VERSION: ${{ inputs.postgres_version }}
          PACKAGING_REVISION: ${{ inputs.packaging_revision }}
          TARGET_PLATFORM: ${{ matrix.target }}
          DIST_DIR: dist/${{ matrix.target }}
          PUBLISH_GITHUB_RELEASE: ${{ inputs.publish_release }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/runtime-packaging/publish-phase1.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.publish.outputs.artifact_name }}
          path: ${{ steps.publish.outputs.artifact_path }}
          if-no-files-found: error
