name: Release

# Tag-driven Maven Central release via the shared reusable workflow.
# Tag vX.Y.Z[-qualifier] -> publishes exactly that version (e.g. v1.0.1-RC1 -> 1.0.1-RC1).
# The full pipeline (gates + tests + OWASP + SBOM + signing) runs before anything ships.
on:
  push:
    tags: ['v*']

jobs:
  release:
    uses: virtualparadoxorg/ci-workflows/.github/workflows/maven-central-release.yml@v1
    with:
      # The build-tools and integration-test modules are not published.
      maven-args: "-DexcludeArtifacts=managed-postgres-runtime-packager,managed-postgres-test,managed-postgres-fake-runtime-it,managed-postgres-real-runtime-it"
    secrets: inherit
