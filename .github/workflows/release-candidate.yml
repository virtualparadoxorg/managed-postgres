name: release-candidate

# Manual-only pre-release smoke. The real Central release runs from release.yml on v* tags;
# this no longer triggers on tags to avoid double-running on a release.
on:
  workflow_dispatch:

jobs:
  release-candidate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Verify tag version
        run: |
          echo "Verifying tag version from ${GITHUB_REF_NAME}"

      - name: Credential-free deploy smoke
        run: |
          mkdir -p staging-repo
          ./mvnw -fae clean deploy \
            -DaltDeploymentRepository=local-staging::default::file:$(pwd)/staging-repo
