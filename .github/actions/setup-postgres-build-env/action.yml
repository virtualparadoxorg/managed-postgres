name: Setup PostgreSQL Build Environment
description: Install Phase 1 runtime packaging prerequisites on GitHub-hosted runners.

inputs:
  skip-install:
    description: Skip runner dependency installation for smoke-mode packaging.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Prepare Linux build dependencies
      if: runner.os == 'Linux' && inputs.skip-install != 'true'
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y build-essential perl

    - name: Prepare macOS build dependencies
      if: runner.os == 'macOS' && inputs.skip-install != 'true'
      shell: bash
      run: |
        set -euo pipefail
        xcode-select -p >/dev/null
        perl -v >/dev/null

    - name: Prepare Windows build dependencies
      if: runner.os == 'Windows' && inputs.skip-install != 'true'
      shell: powershell
      run: |
        $ErrorActionPreference = "Stop"
        choco install strawberryperl -y --no-progress
        refreshenv
        perl -v | Out-Null
