name: Setup PostgreSQL Build Environment
description: Install Phase 1 runtime packaging prerequisites on GitHub-hosted runners.

inputs:
  skip-install:
    description: Skip runner dependency installation for smoke-mode packaging.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Prepare Linux build dependencies
      if: runner.os == 'Linux' && inputs.skip-install != 'true'
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y build-essential perl

    - name: Prepare macOS build dependencies
      if: runner.os == 'macOS' && inputs.skip-install != 'true'
      shell: bash
      run: |
        set -euo pipefail
        xcode-select -p >/dev/null
        brew list make >/dev/null 2>&1 || brew install make
        perl -v >/dev/null

    - name: Prepare Windows build dependencies
      if: runner.os == 'Windows' && inputs.skip-install != 'true'
      shell: powershell
      run: |
        $ErrorActionPreference = "Stop"
        choco install strawberryperl -y --no-progress
        choco install winflexbison3 -y --no-progress
        refreshenv
        perl -v | Out-Null

        $shimDir = Join-Path $env:RUNNER_TEMP "managed-postgres-winflexbison"
        New-Item -ItemType Directory -Path $shimDir -Force | Out-Null

        $winBison = (Get-Command win_bison.exe -ErrorAction Stop).Source
        $winFlex = (Get-Command win_flex.exe -ErrorAction Stop).Source

        @(
          @{
            Name = "bison.cmd"
            Target = $winBison
          },
          @{
            Name = "flex.cmd"
            Target = $winFlex
          }
        ) | ForEach-Object {
          $shimPath = Join-Path $shimDir $_.Name
          "@echo off`r`n""$($_.Target)"" %*`r`n" | Set-Content -Path $shimPath -Encoding ascii
        }

        $shimDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
